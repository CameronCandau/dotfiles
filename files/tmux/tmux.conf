set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 100000
set -g renumber-windows on
set -g mode-keys vi
set -g allow-passthrough on
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY PATH"
set -g default-command "exec bash -l"
set -g default-terminal "tmux-256color"
set -s extended-keys on
set -g status-position bottom
set -g status-keys vi
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 200
set -g display-panes-time 1200
set -g bell-action any
set -g visual-activity off
setw -g monitor-activity on

set -g status-style bg=colour235,fg=colour250
set -g window-status-current-style fg=colour81,bold
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=yellow]#([ -n \"$IP\" ] && echo \"\\$IP:$IP\" || echo \"\") #[fg=cyan]#(ip addr show tun0 2>/dev/null | grep 'inet ' | awk '{print $2}' | cut -d/ -f1 | sed 's/^/tun0: /') #[fg=white]%Y-%m-%d %H:%M"

setw -g aggressive-resize on
setw -g automatic-rename on
setw -g allow-rename on

# Fast pane navigation without changing the rest of the default tmux keymap.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Copy-mode ergonomics.
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
