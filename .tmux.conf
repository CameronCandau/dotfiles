unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -as terminal-features ",wezterm:RGB"
set -s extended-keys on
set -g status-position bottom
set -g status-keys vi
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 160
set -g display-panes-time 1200
set -g bell-action any
set -g visual-activity off
setw -g monitor-activity on

set -g status-style bg=colour235,fg=colour250
set -g window-status-current-style fg=colour81,bold
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=yellow]#(cat #{pane_current_path}/.target 2>/dev/null | tr -d '\n' | sed 's/^/IP: /') #[fg=white]%Y-%m-%d %H:%M"

setw -g aggressive-resize on
setw -g automatic-rename on
setw -g allow-rename on

# Preserve direct muscle-memory movement.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Direct WezTerm-style management bindings.
bind -n C-M-H split-window -h -b -c "#{pane_current_path}"
bind -n C-M-V split-window -v -b -c "#{pane_current_path}"
bind -n C-M-X confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind -n C-M-F resize-pane -Z
bind -n C-M-T new-window -c "#{pane_current_path}"
bind -n C-M-W confirm-before -p "Kill window #W? (y/n)" kill-window
bind -n C-M-E command-prompt -I "#W" "rename-window -- '%%'"
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Down resize-pane -D 5

# Leader-based fallbacks for terminals or remotes that don't pass the full chord.
bind h split-window -h -b -c "#{pane_current_path}"
bind v split-window -v -b -c "#{pane_current_path}"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind f resize-pane -Z
bind t new-window -c "#{pane_current_path}"
bind w confirm-before -p "Kill window #W? (y/n)" kill-window
bind e command-prompt -I "#W" "rename-window -- '%%'"
bind Left resize-pane -L 5
bind Right resize-pane -R 5
bind Up resize-pane -U 5
bind Down resize-pane -D 5
bind Tab next-window
bind BTab previous-window
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9
bind 0 select-window -t :=10
bind -n M-Tab next-window
bind -n M-BTab previous-window

# Session helpers.
bind n command-prompt -p "new session" "new-session -Ad -s '%%' \\; switch-client -t '%%'"
bind s choose-tree -sZw
bind r command-prompt -I "#S" "rename-session -- '%%'"
bind d detach-client
bind m command-prompt -p "machine session" "run-shell '$HOME/.config/tmux/scripts/bootstrap-machine-session.sh \"%%\"'"

# Logging helpers.
bind P run-shell "$HOME/.config/tmux/scripts/toggle-pane-logging.sh '#{pane_id}'"

# Copy-mode ergonomics.
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
